name: GitHub Trending Daily Bot

# 触发器配置
on:
  schedule:
    # 使用 cron 表达式，UTC 时间。
    # 下方配置为每天 UTC 01:00 执行（对应北京/吉隆坡时间早上 09:00）
    - cron: "0 1 * * *"
  workflow_dispatch: # 保留手动触发按钮，便于线上调试

jobs:
  build-and-run:
    runs-on: ubuntu-latest # 指定运行的云端物理机环境

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip" # 启用依赖缓存，加速后续运行

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Main Pipeline
        # 环境变量动态挂载，从 GitHub Secrets 读取注入
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py
